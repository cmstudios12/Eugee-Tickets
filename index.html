<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Gospel Show | Bulk Ticket Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --primary: #0d6efd;
      --muted: #6c757d;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(135deg, #0b1c2d, #102a43);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      width: 100%;
      max-width: 520px;
      padding: 32px;
      border-radius: var(--radius);
      box-shadow: 0 30px 70px rgba(0, 0, 0, .35);
    }

    .header {
      text-align: center;
      margin-bottom: 26px;
    }

    .header i {
      font-size: 36px;
      color: var(--primary);
    }

    .header h1 {
      margin: 6px 0 4px;
      font-size: 22px;
    }

    .header p {
      font-size: 14px;
      color: var(--muted);
    }

    label {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      display: block;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      margin-bottom: 14px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #084298;
    }

    .qr-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 18px;
      margin-top: 24px;
    }

    .qr-item {
      border: 1px dashed #ddd;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
    }

    .qr-item canvas {
      margin: auto;
    }

    .qr-code {
      font-size: 11px;
      word-break: break-all;
      margin-top: 6px;
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="header">
      <i class="fa-solid fa-layer-group"></i>
      <h1>Bulk QR Ticket Generator</h1>
      <p>Generate & download multiple tickets at once</p>
    </div>

    <label>Ticket Type</label>
    <select id="type">
      <option value="GENERAL">General Admission</option>
      <option value="VIP">VIP Access</option>
    </select>

    <label>Number of Tickets</label>
    <input type="number" id="quantity" min="1" max="500" placeholder="e.g. 50" />

    <button id="generateBtn" onclick="generateBulkTickets()">
      <i class="fa-solid fa-qrcode"></i> Generate QR Codes
    </button>

    <div id="loader" style="display:none;margin-top:15px;text-align:center;">
      <i class="fa-solid fa-spinner fa-spin" style="font-size:22px;color:#0d6efd"></i>
      <div style="font-size:13px;color:#6c757d;margin-top:6px;">Generating tickets, please wait...</div>
    </div>

    <div id="qrGrid" class="qr-grid"></div>

    <div class="footer">© Gospel Event • Bulk Secure Ticketing</div>
  </div>

  <script>
    const SUPABASE_URL = "https://nsmzfsbweutysbdhgjec.supabase.co";
    const SUPABASE_KEY = "sb_publishable_bEvuBN_PM3UdX1ferXyQkg_tR97hhN7";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function generateBulkTickets() {
      const loader = document.getElementById("loader");
      const btn = document.getElementById("generateBtn");
      loader.style.display = "block";
      btn.disabled = true;
      btn.style.opacity = "0.7";
      const qty = parseInt(document.getElementById("quantity").value);
      const type = document.getElementById("type").value;
      const grid = document.getElementById("qrGrid");
      grid.innerHTML = "";

      if (!qty || qty < 1) {
        alert("Enter valid quantity");
        return;
      }

      const { data: eventData } = await supabaseClient.from("events").select("id").limit(1);
      if (!eventData?.length) return alert("Event not found");

      for (let i = 0; i < qty; i++) {
        const ticketCode = "GOSPEL-" + crypto.randomUUID();

        await supabaseClient.from("tickets").insert({
          event_id: eventData[0].id,
          ticket_code: ticketCode,
          ticket_type: type
        });

        const box = document.createElement("div");
        box.className = "qr-item";

        const qrDiv = document.createElement("div");
        box.appendChild(qrDiv);

        new QRCode(qrDiv, { text: ticketCode, width: 140, height: 140 });

        const code = document.createElement("div");
        code.className = "qr-code";
        code.innerText = ticketCode;
        box.appendChild(code);

        box.onclick = () => downloadQR(qrDiv.querySelector("canvas"), ticketCode);

        grid.appendChild(box);
        await new Promise(r => setTimeout(r, 60));
      }
      loader.style.display = "none";
      btn.disabled = false;
      btn.style.opacity = "1";
    }

    function downloadQR(canvas, filename) {
      const link = document.createElement("a");
      link.download = filename + ".png";
      link.href = canvas.toDataURL();
      link.click();
    }
  </script>
</body>

</html>
